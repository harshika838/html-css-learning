<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>challenge exercise p12</title>
    <style>
        .home{
            color: white;
       font-family: ARIAL;
       padding-left:20px

        }

        .searchbar{
            border-radius: 10px; border:none; width: 800px;
        }

        button{
            background-color: rgb(103, 124, 206)
        ;color:white ;border-color: white;border-style: solid;
            
        }

        
        img{
            height:70px;
            width:70px;
            object-fit: cover;
            border-radius: 90px;
            margin-right: 11px;;
            
        }

        .flex{
            display: flex;
            flex-direction: row;
            height:100px;
            align-items:center;
            

        }


        div{
            font-family:arial;
        }

        .container{
            border-width: 1px;
            border-style: solid;
            border-color: rgb(200,200,200);
            width:300px;
            border-radius:6;
            margin-bottom:30px;
        }

        .flexbox{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items:center;
            padding-top: 6px;
            padding-bottom: 6px;
            padding-left: 12px;
            padding-right: 12px;
            

        }

        .notification{
            background-color: rgb(49,109,245);
            color:white;
            padding-top:3px;
            padding-bottom: 3px;
            padding-left:10px;
            padding-right:10px;
            border-radius:20px;
            font-size:14px;
            
        }

        .name{
            font-weight:bold;

            margin-bottom:7px;
            
            
        }

        .info{
            font-size:11px;
            color:gray;
            margin-top:3px;

        }

        .user-info{

        }

        .follow{
            padding-top:6px;
            padding-bottom: 6px;
            padding-left:14px;
            padding-right:12px;
            
            
        }

        

     
    </style>

    <div class="main-div" style="

        ">

    <div class="12g">

    <div class="12g">

 <div class="12g">
