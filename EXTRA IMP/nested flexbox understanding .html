<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>challenge exercise p13</title>
</head>
<body>

    <style>
        .flex{
            display: flex;
            flex-direction: row;
            gap:30px;
            height:250px;
            width:700px;
           
            }
           

            .item{
                display:flex;
                flex-direction: column;
                background-color: lightblue;
                color:white;
                border-radius: 10px;
                width:200px;
                
                

            }

            .row{
                display:flex;
                flex-direction: column;
                gap:10px;
                flex:1;
                align-items: stretch;
                
               
            }

            .row1{
                 display: flex;
                flex-direction: column;
                flex:1;
               
                background-color: lightpink;
                color:white;
                border-radius: 10px;
               
               

                
            }

             .row2{
                display:flex;
                flex-direction: row;
                justify-content: center;
                gap:20px;
                flex:1;
                align-items:stretch;
                
                 

            }

           

            

            .hrow2,.hrow1{
                display: flex;
                flex-direction: row;
                gap:40px;
                flex:1;
                background-color: lightpink;
                color:white;
                border-radius: 10px;

            }
        
    </style>

    <div class="flex">
        <div class="item">item</div>
        <div class="row">
            <div class="row1">row1</div>
        <div class="row2">
            <div class="hrow1">row2</div>
            <div class="hrow2">row2</div>
        </div>
        </div>
        
    </div>
    
</body>
</html>
